name: EAS Preview

on:
  workflow_run:
    workflows: ["Mobile CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: eas-preview-main
  cancel-in-progress: true

jobs:
  build:
    if: vars.EAS_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    environment: preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve source revision
        id: source
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate Expo project
        run: npx expo-doctor
      - name: Trigger internal Android and iOS builds
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
        run: eas build --platform all --profile preview --non-interactive --no-wait
